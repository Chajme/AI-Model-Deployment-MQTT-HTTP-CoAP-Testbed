#  # ========================
#  # CoAP
#  # ========================
  coap-server:
    build: .
    cap_add:
      - NET_ADMIN
    command: [ "/app/scripts/network_chaos.sh" ]
#    command: python -m protocols.CoAP.server.coap_server
    ports:
      - "5683:5683/udp"
    volumes:
      - ./output:/app/output
      - ./:/app
    networks:
      - coap-net
    environment:
      - MEASUREMENT_SUFFIX=_testing
      - APP_COMMAND=python -m protocols.CoAP.server.coap_server_v2
      - NETWORK_PROFILE=iot

  coap-client:
    build: .
#    command: python -m protocols.CoAP.client.coap_client_v2
    cap_add:
      - NET_ADMIN
    command: [ "/app/scripts/network_chaos.sh" ]
    depends_on:
      - coap-server
    volumes:
      - ./:/app
      - ./output:/app/output
    networks:
      - coap-net
    environment:
      - MEASUREMENT_SUFFIX=_testing
      - APP_COMMAND=python -m protocols.CoAP.client.coap_client_v2
      - NETWORK_PROFILE=iot

networks:
  mqtt-net:
    driver: bridge
  coap-net:
    driver: bridge
  http-net:
    driver: bridge
