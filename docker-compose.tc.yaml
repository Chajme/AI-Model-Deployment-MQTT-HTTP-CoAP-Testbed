services:

#  # ========================
#  # MQTT
#  # ========================
  mosquitto-broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    networks:
      - mqtt-net
    volumes:
      - ./protocols/MQTT/mosquitto.conf:/mosquitto-broker/mosquitto.conf

  mqtt-client-a:
    build: ./
    command: python -m protocols.MQTT.clients.mqtt_client_a
    cap_add:
      - NET_ADMIN
#    command: [ "/app/scripts/network_chaos.sh" ]
    depends_on:
      - mosquitto-broker
    volumes:
      - ./output:/app/output
      - ./:/app
    networks:
      - mqtt-net
    environment:
      - APP_COMMAND=python -m protocols.MQTT.clients.mqtt_client_a
#      - NETWORK_PROFILE=iot   # or good/harsh/mobile/satellite
      - MEASUREMENT_SUFFIX=_added-wait-for-ack

  mqtt-client-b:
    build: ./
    command: python -m protocols.MQTT.clients.mqtt_client_b
    depends_on:
      - mosquitto-broker
    volumes:
      - ./output:/app/output
      - ./:/app
    networks:
      - mqtt-net
    environment:
      - MEASUREMENT_SUFFIX=_added-wait-for-ack

