  # ========================
  # HTTP
  # ========================
  http-server:
#    image: nginx:alpine
    build: .
    command: python -m protocols.HTTP.server.flask_server
    ports:
      - "8000:80"
    volumes:
      - ./protocols/HTTP/server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads/upload
    networks:
      - http-net

  http-client:
    build: .
    cap_add:
      - NET_ADMIN
#    command: python -m protocols.HTTP.client.http_client
    command: ["/app/scripts/network_chaos.sh"]
    depends_on:
      - http-server
    volumes:
      - ./output:/app/output
      - ./:/app
    networks:
      - http-net
    environment:
      - MEASUREMENT_SUFFIX=_chaos
      - APP_COMMAND=python -m protocols.HTTP.client.http_client

