  # ========================
  # HTTP
  # ========================
  http-server:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./protocols/HTTP/server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads/upload
    networks:
      - iot-net

  http-client:
    build: .
    command: python -m protocols.HTTP.client.http_client
    depends_on:
      - http-server
    volumes:
      - ./output:/app/output
      - ./:/app
    networks:
      - iot-net
    environment:
      - MEASUREMENT_SUFFIX=_chaos

#  # ========================
#  # CoAP
#  # ========================
#  coap-server:
#    build: .
#    command: python -m protocols.CoAP.server.coap_server
#    ports:
#      - "5683:5683/udp"
#    volumes:
#      - ./output:/app/output
#      - ./:/app
#
#  coap-client:
#    build: .
#    command: python -m protocols.CoAP.client.coap_client
#    depends_on:
#      - coap-server
#    volumes:
#      - ./:/app

  # ========================
  # CHAOS ENGINE (Pumba)
  # ========================
  pumba-delay:
    image: ghcr.io/alexei-led/pumba:latest
    depends_on:
      - http-client
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - iot-net
    command:
      - --interval
      - 120s
      - netem
      - --duration
      - 60s
      - delay
      - --time
      - "150"
      - --jitter
      - "50"
      - --correlation
      - "25"
      - rate
      - --rate
      - 1mbit
      - re2:.*(client|server).*

    # Alternative profiles (uncomment to switch):

    # --- HARSH IoT (LPWAN-like) ---
    # command: >
    #   --interval 40s
    #   netem
    #   --duration 25s
    #   delay --time 600 --jitter 200
    #   loss --percent 20
    #   re2:.*client.*

    # --- PACKET LOSS FOCUS (CoAP stress) ---
    # command: >
    #   --interval 30s
    #   netem
    #   --duration 20s
    #   loss --percent 15 --correlation 50
    #   re2:coap-client

    # --- MQTT DISRUPTION (simulate reconnect storms) ---
    # command: >
    #   --interval 60s
    #   kill
    #   --signal SIGKILL
    #   re2:mqtt-client.*

networks:
  iot-net:
    driver: bridge