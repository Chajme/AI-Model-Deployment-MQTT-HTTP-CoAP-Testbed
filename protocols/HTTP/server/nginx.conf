server {
    listen 80;
    server_name localhost;

    # Where the binary files will be stored
    root /var/www/uploads;

    location /upload/ {
        # Allow files up to 1GB (adjust as needed for your AI models)
        client_max_body_size 1000M;

        # Enable WebDAV methods to allow direct file writing
        dav_methods PUT DELETE MKCOL COPY MOVE;

        # Create directories if they don't exist
        create_full_put_path on;

        # Set permissions for the uploaded files
        dav_access user:rw group:rw all:r;

        # Optional: Disable logging for maximum performance during benchmarks
        # access_log off;
    }
}