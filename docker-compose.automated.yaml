services:

#  # ========================
#  # MQTT
#  # ========================
  mosquitto-broker:
    profiles: ["mqtt"]
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    networks:
      - mqtt-net
    volumes:
      - ./protocols/MQTT/mosquitto.conf:/mosquitto-broker/mosquitto.conf

  mqtt-client-a:
    profiles: ["mqtt"]
    build: ./
#    command: python -m protocols.MQTT.clients.mqtt_client_a
    cap_add:
      - NET_ADMIN
    command: [ "/app/scripts/network_chaos.sh" ]
    depends_on:
      - mosquitto-broker
    volumes:
      - ./output/${MEASUREMENT_SUFFIX}:/app/output
      - ./:/app
      - ./output:/app/output
    networks:
      - mqtt-net
    environment:
      - APP_COMMAND=python -m protocols.MQTT.clients.client_a
      - NETWORK_PROFILE=${NETWORK_PROFILE}
      - MEASUREMENT_SUFFIX=${MEASUREMENT_SUFFIX}

  mqtt-client-b:
    profiles: ["mqtt"]
    build: ./
    cap_add:
      - NET_ADMIN
    command: [ "/app/scripts/network_chaos.sh" ]
#    command: python -m protocols.MQTT.clients.mqtt_client_b
    depends_on:
      - mosquitto-broker
    volumes:
      - ./output/${MEASUREMENT_SUFFIX}:/app/output
      - ./:/app
      - ./output:/app/output
    networks:
      - mqtt-net
    environment:
      - APP_COMMAND=python -m protocols.MQTT.clients.client_b
      - MEASUREMENT_SUFFIX=${MEASUREMENT_SUFFIX}

  # ========================
  # HTTP
  # ========================
  http-server:
    profiles: ["http"]
#    image: nginx:alpine
    build: .
    cap_add:
      - NET_ADMIN                          # needed for tc on server too
    command: [ "/app/scripts/network_chaos.sh" ]
#    command: python -m protocols.HTTP.server.flask_server
    ports:
      - "8080:8000"
    volumes:
#      - ./protocols/HTTP/server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads/upload
      - ./:/app
      - ./output:/app/output
    networks:
      - http-net
    environment:
      - APP_COMMAND=python -m protocols.HTTP.server.flask_server

  http-client:
    profiles: ["http"]
    build: .
    cap_add:
      - NET_ADMIN
#    command: python -m protocols.HTTP.client.http_client
    command: ["/app/scripts/network_chaos.sh"]
    depends_on:
      - http-server
    volumes:
      - ./output/${MEASUREMENT_SUFFIX}:/app/output
      - ./:/app
      - ./output:/app/output
    networks:
      - http-net
    environment:
      - APP_COMMAND=python -m protocols.HTTP.client.http_client_v3
      - NETWORK_PROFILE=${NETWORK_PROFILE}
      - MEASUREMENT_SUFFIX=${MEASUREMENT_SUFFIX}

#  # ========================
#  # CoAP
#  # ========================
  coap-server:
    profiles: ["coap"]
    build: .
    cap_add:
      - NET_ADMIN
    command: [ "/app/scripts/network_chaos.sh" ]
#    command: python -m protocols.CoAP.server.coap_server
    ports:
      - "5683:5683/udp"
    volumes:
      - ./output/${MEASUREMENT_SUFFIX}:/app/output
      - ./:/app
      - ./output:/app/output
    networks:
      - coap-net
    environment:
      - APP_COMMAND=python -m protocols.CoAP.server.coap_server_v2

  coap-client:
    profiles: ["coap"]
    build: .
#    command: python -m protocols.CoAP.client.coap_client_v2
    cap_add:
      - NET_ADMIN
    command: [ "/app/scripts/network_chaos.sh" ]
    depends_on:
      - coap-server
    volumes:
      - ./:/app
      - ./output/${MEASUREMENT_SUFFIX}:/app/output
      - ./output:/app/output
    networks:
      - coap-net
    environment:
      - APP_COMMAND=python -m protocols.CoAP.client.coap_client_v2
      - NETWORK_PROFILE=${NETWORK_PROFILE}
      - MEASUREMENT_SUFFIX=${MEASUREMENT_SUFFIX}
#
networks:
  mqtt-net:
    driver: bridge
  coap-net:
    driver: bridge
  http-net:
    driver: bridge
